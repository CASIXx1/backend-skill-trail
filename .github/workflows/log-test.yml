name: Log Test

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  run-log-test:
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Validate and mask GitHub environment secrets
        run: .github/scripts/validate-aws-env.sh

      - name: Assume AWS role with OIDC
        run: .github/scripts/assume-aws-role.sh
        env:
          AWS_ROLE_SESSION_NAME: github-actions-log-test

      - name: Run log test endpoints
        run: .github/scripts/run-log-test-endpoints.sh
