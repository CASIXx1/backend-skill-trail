name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}

    steps:
      - name: Validate and mask GitHub environment secrets
        run: |
          set -euo pipefail
          for name in AWS_REGION AWS_ROLE_ARN TF_STATE_BUCKET TF_STATE_KEY; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required secret: ${name}" >&2
              exit 1
            fi
            echo "::add-mask::${!name}"
          done

          aws_account_id="$(awk -F: '{print $5}' <<< "$AWS_ROLE_ARN")"
          if [[ -n "$aws_account_id" ]]; then
            echo "::add-mask::${aws_account_id}"
          fi

          image_tag="${GITHUB_SHA}"
          docker_platform="linux/arm64"
          echo "::add-mask::${image_tag}"
          echo "::add-mask::${docker_platform}"
          {
            echo "IMAGE_TAG=${image_tag}"
            echo "DOCKER_PLATFORM=${docker_platform}"
          } >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Assume AWS role with OIDC
        run: |
          set -euo pipefail

          oidc_response="$(curl -sSf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")"
          oidc_token="$(jq -r '.value' <<< "$oidc_response")"
          if [[ -z "$oidc_token" || "$oidc_token" == "null" ]]; then
            echo "Failed to get GitHub OIDC token." >&2
            exit 1
          fi
          echo "::add-mask::${oidc_token}"

          credentials="$(aws sts assume-role-with-web-identity \
            --role-arn "$AWS_ROLE_ARN" \
            --role-session-name "github-actions-deploy-backend" \
            --web-identity-token "$oidc_token" \
            --duration-seconds 3600 \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text)"

          read -r aws_access_key_id aws_secret_access_key aws_session_token <<< "$credentials"
          for value in "$aws_access_key_id" "$aws_secret_access_key" "$aws_session_token"; do
            if [[ -z "$value" ]]; then
              echo "Failed to assume AWS role." >&2
              exit 1
            fi
            echo "::add-mask::${value}"
          done

          {
            echo "AWS_ACCESS_KEY_ID=${aws_access_key_id}"
            echo "AWS_SECRET_ACCESS_KEY=${aws_secret_access_key}"
            echo "AWS_SESSION_TOKEN=${aws_session_token}"
            echo "AWS_DEFAULT_REGION=${AWS_REGION}"
          } >> "$GITHUB_ENV"

      - name: Load deployment values from Terraform state
        run: |
          set -euo pipefail
          aws s3 cp "s3://${TF_STATE_BUCKET}/${TF_STATE_KEY}" /tmp/terraform.tfstate >/dev/null

          ecr_repository_url="$(jq -r '.outputs.api_ecr_repository_url.value // empty' /tmp/terraform.tfstate)"
          ecs_cluster_name="$(jq -r '.outputs.ecs_cluster_name.value // empty' /tmp/terraform.tfstate)"
          ecs_service_name="$(jq -r '.outputs.api_ecs_service_name.value // empty' /tmp/terraform.tfstate)"

          for name in ecr_repository_url ecs_cluster_name ecs_service_name; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required Terraform state output: ${name}" >&2
              exit 1
            fi
            echo "::add-mask::${!name}"
          done

          tfstate_url="s3://${TF_STATE_BUCKET}/${TF_STATE_KEY}"
          echo "::add-mask::${tfstate_url}"

          {
            echo "ECR_REPOSITORY_URL=${ecr_repository_url}"
            echo "ECS_CLUSTER_NAME=${ecs_cluster_name}"
            echo "ECS_SERVICE_NAME=${ecs_service_name}"
            echo "TFSTATE_URL=${tfstate_url}"
            echo "CONTAINER_NAME=app"
            echo "CONTAINER_PORT=8080"
            echo "ASSIGN_PUBLIC_IP=DISABLED"
          } >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        run: |
          set -euo pipefail
          ecr_registry="${ECR_REPOSITORY_URL%%/*}"
          echo "::add-mask::${ecr_registry}"
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ecr_registry" >/dev/null

      - name: Build and push image
        run: |
          set -euo pipefail
          image_uri="${ECR_REPOSITORY_URL}:${IMAGE_TAG}"
          echo "::add-mask::${image_uri}"
          docker buildx build \
            --platform "$DOCKER_PLATFORM" \
            --tag "$image_uri" \
            --push \
            .
          echo "ECR image push completed."

      - name: Install ecspresso
        uses: kayac/ecspresso@v2
        with:
          version: v2.8.4

      - name: Render ecspresso definitions
        run: |
          set -euo pipefail
          ecspresso --config ecspresso/ecspresso.yml render config >/dev/null
          ecspresso --config ecspresso/ecspresso.yml render task-definition >/dev/null
          ecspresso --config ecspresso/ecspresso.yml render service-definition >/dev/null
          echo "ecspresso render completed."

      - name: Deploy with ecspresso
        run: |
          set -euo pipefail
          ecspresso --config ecspresso/ecspresso.yml deploy
