name: CI

on:
  pull_request:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: 1.23.4
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/arm64
          push: false
          tags: backend-skill-trail:ci

      - name: Build migration image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.migration
          platforms: linux/arm64
          push: false
          tags: backend-skill-trail-migration:ci

      - name: Build worker image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.worker
          platforms: linux/arm64
          push: false
          tags: backend-skill-trail-worker:ci

      - name: Build scheduled-log image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.scheduled-log
          platforms: linux/arm64
          push: false
          tags: backend-skill-trail-scheduled-log:ci
