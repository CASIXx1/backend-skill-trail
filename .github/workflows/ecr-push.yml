name: ECR Push

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

permissions:
  contents: read
  id-token: write

jobs:
  push:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Mask and export GitHub environment variables
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const os = require('os');
            const values = {
              AWS_REGION: '${{ vars.AWS_REGION }}',
              AWS_ROLE_ARN: '${{ vars.AWS_ROLE_ARN }}',
              TF_STATE_BUCKET: '${{ vars.TF_STATE_BUCKET }}',
              TF_STATE_KEY: '${{ vars.TF_STATE_KEY }}',
              IMAGE_TAG: '${{ github.sha }}',
              DOCKER_PLATFORM: 'linux/arm64',
            };

            for (const [name, value] of Object.entries(values)) {
              if (!value) {
                core.setFailed(`Missing required variable: ${name}`);
                return;
              }
              core.setSecret(value);
              fs.appendFileSync(process.env.GITHUB_ENV, `${name}=${value}${os.EOL}`);
            }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Assume AWS role with OIDC
        run: |
          set -euo pipefail

          oidc_response="$(curl -sSf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")"
          oidc_token="$(jq -r '.value' <<< "$oidc_response")"
          if [[ -z "$oidc_token" || "$oidc_token" == "null" ]]; then
            echo "Failed to get GitHub OIDC token." >&2
            exit 1
          fi
          echo "::add-mask::${oidc_token}"

          credentials="$(aws sts assume-role-with-web-identity \
            --role-arn "$AWS_ROLE_ARN" \
            --role-session-name "github-actions-ecr-push" \
            --web-identity-token "$oidc_token" \
            --duration-seconds 3600 \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text)"

          read -r aws_access_key_id aws_secret_access_key aws_session_token <<< "$credentials"
          for value in "$aws_access_key_id" "$aws_secret_access_key" "$aws_session_token"; do
            if [[ -z "$value" ]]; then
              echo "Failed to assume AWS role." >&2
              exit 1
            fi
            echo "::add-mask::${value}"
          done

          {
            echo "AWS_ACCESS_KEY_ID=${aws_access_key_id}"
            echo "AWS_SECRET_ACCESS_KEY=${aws_secret_access_key}"
            echo "AWS_SESSION_TOKEN=${aws_session_token}"
            echo "AWS_DEFAULT_REGION=${AWS_REGION}"
          } >> "$GITHUB_ENV"

      - name: Load ECR repository URL from Terraform state
        run: |
          set -euo pipefail
          aws s3 cp "s3://${TF_STATE_BUCKET}/${TF_STATE_KEY}" /tmp/terraform.tfstate >/dev/null

          ecr_repository_url="$(jq -r '.outputs.api_ecr_repository_url.value // empty' /tmp/terraform.tfstate)"
          if [[ -z "$ecr_repository_url" ]]; then
            echo "Missing required Terraform state output: api_ecr_repository_url" >&2
            exit 1
          fi

          echo "::add-mask::${ecr_repository_url}"
          echo "ECR_REPOSITORY_URL=${ecr_repository_url}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        run: |
          set -euo pipefail
          ecr_registry="${ECR_REPOSITORY_URL%%/*}"
          echo "::add-mask::${ecr_registry}"
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ecr_registry" >/dev/null

      - name: Build and push image
        run: |
          set -euo pipefail
          image_uri="${ECR_REPOSITORY_URL}:${IMAGE_TAG}"
          echo "::add-mask::${image_uri}"
          docker buildx build \
            --platform "$DOCKER_PLATFORM" \
            --tag "$image_uri" \
            --push \
            .
          echo "ECR image push completed."
