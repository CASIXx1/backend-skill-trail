name: AWS Connect

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

permissions:
  contents: read
  id-token: write

jobs:
  connect:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Mask GitHub environment variables
        run: |
          echo "::add-mask::${AWS_REGION}"
          echo "::add-mask::${AWS_ROLE_ARN}"

      - name: Validate GitHub variables
        run: |
          set -euo pipefail
          if [[ -z "${AWS_REGION:-}" ]]; then
            echo "Missing dev environment variable: AWS_REGION" >&2
            exit 1
          fi
          if [[ -z "${AWS_ROLE_ARN:-}" ]]; then
            echo "Missing dev environment variable: AWS_ROLE_ARN" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          mask-aws-account-id: true

      - name: Verify AWS identity
        run: |
          set -euo pipefail
          aws sts get-caller-identity >/dev/null
          echo "AWS OIDC connection verified."
