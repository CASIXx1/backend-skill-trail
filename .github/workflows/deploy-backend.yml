name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Validate and mask GitHub environment secrets
        run: .github/scripts/init-deploy-env.sh

      - name: Assume AWS role with OIDC
        run: .github/scripts/assume-aws-role.sh
        env:
          AWS_ROLE_SESSION_NAME: github-actions-deploy-backend

      - name: Load deployment values from Terraform state
        run: .github/scripts/load-deploy-values.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Login to Amazon ECR
        run: |
          set -euo pipefail
          for repository_url in "$ECR_REPOSITORY_URL" "$WORKER_ECR_REPOSITORY_URL" "$MIGRATION_ECR_REPOSITORY_URL" "$SCHEDULED_LOG_ECR_REPOSITORY_URL"; do
            ecr_registry="${repository_url%%/*}"
            echo "::add-mask::${ecr_registry}"
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ecr_registry" >/dev/null
          done

      - name: Build and push image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: ${{ env.DOCKER_PLATFORM }}
          push: true
          tags: ${{ env.ECR_REPOSITORY_URL }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ env.ECR_REPOSITORY_URL }}:buildcache
          cache-to: type=registry,ref=${{ env.ECR_REPOSITORY_URL }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

      - name: Build and push migration image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.migration
          platforms: ${{ env.DOCKER_PLATFORM }}
          push: true
          tags: ${{ env.MIGRATION_ECR_REPOSITORY_URL }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ env.MIGRATION_ECR_REPOSITORY_URL }}:buildcache
          cache-to: type=registry,ref=${{ env.MIGRATION_ECR_REPOSITORY_URL }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

      - name: Build and push worker image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.worker
          platforms: ${{ env.DOCKER_PLATFORM }}
          push: true
          tags: ${{ env.WORKER_ECR_REPOSITORY_URL }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ env.WORKER_ECR_REPOSITORY_URL }}:buildcache
          cache-to: type=registry,ref=${{ env.WORKER_ECR_REPOSITORY_URL }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

      - name: Build and push scheduled-log image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.scheduled-log
          platforms: ${{ env.DOCKER_PLATFORM }}
          push: true
          tags: ${{ env.SCHEDULED_LOG_ECR_REPOSITORY_URL }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ env.SCHEDULED_LOG_ECR_REPOSITORY_URL }}:buildcache
          cache-to: type=registry,ref=${{ env.SCHEDULED_LOG_ECR_REPOSITORY_URL }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

      - name: Install ecspresso
        uses: kayac/ecspresso@v2
        with:
          version: v2.8.4

      - name: Render ecspresso definitions
        run: |
          set -euo pipefail
          ecspresso --config ecspresso/ecspresso.yml render config >/dev/null
          ecspresso --config ecspresso/ecspresso.yml render task-definition >/dev/null
          ecspresso --config ecspresso/ecspresso.yml render service-definition >/dev/null
          ecspresso --config ecspresso/migration/ecspresso.yml render config >/dev/null
          ecspresso --config ecspresso/migration/ecspresso.yml render task-definition >/dev/null
          ecspresso --config ecspresso/migration/ecspresso.yml render service-definition >/dev/null
          ecspresso --config ecspresso/worker/ecspresso.yml render config >/dev/null
          ecspresso --config ecspresso/worker/ecspresso.yml render task-definition >/dev/null
          ecspresso --config ecspresso/worker/ecspresso.yml render service-definition >/dev/null
          ecspresso --config ecspresso/scheduled-log/ecspresso.yml render config >/dev/null
          ecspresso --config ecspresso/scheduled-log/ecspresso.yml render task-definition >/dev/null
          ecspresso --config ecspresso/scheduled-notification/ecspresso.yml render config >/dev/null
          ecspresso --config ecspresso/scheduled-notification/ecspresso.yml render task-definition >/dev/null
          echo "ecspresso render completed."

      - name: Run migration with ecspresso
        run: |
          set -euo pipefail
          export MIGRATION_COMMAND=up
          ecspresso --config ecspresso/migration/ecspresso.yml run --wait

      - name: Verify migration with ecspresso
        run: |
          set -euo pipefail
          export MIGRATION_COMMAND=verify
          ecspresso --config ecspresso/migration/ecspresso.yml run --wait

      - name: Deploy with ecspresso
        run: |
          set -euo pipefail
          ecspresso --config ecspresso/ecspresso.yml deploy
          ecspresso --config ecspresso/worker/ecspresso.yml deploy
          ecspresso --config ecspresso/scheduled-log/ecspresso.yml render task-definition \
            | jq 'walk(if type == "object" and .versionConsistency == "" then del(.versionConsistency) else . end)' \
            > /tmp/scheduled-log-task-def.json
          aws ecs register-task-definition --cli-input-json file:///tmp/scheduled-log-task-def.json >/dev/null
          ecspresso --config ecspresso/scheduled-notification/ecspresso.yml render task-definition \
            | jq 'walk(if type == "object" and .versionConsistency == "" then del(.versionConsistency) else . end)' \
            > /tmp/scheduled-notification-task-def.json
          aws ecs register-task-definition --cli-input-json file:///tmp/scheduled-notification-task-def.json >/dev/null

  log-test:
    needs: deploy
    uses: ./.github/workflows/log-test.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  cache-test:
    needs: deploy
    uses: ./.github/workflows/cache-test.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  worker-e2e-test:
    needs: deploy
    uses: ./.github/workflows/worker-e2e-test.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write
